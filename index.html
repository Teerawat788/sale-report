<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFM Fish Command Center</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:20px;
}

.header{
background:#21409A;
color:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.value{
font-size:28px;
font-weight:bold;
color:#21409A;
}
</style>

</head>
<body>

<div class="header">
<h1>TFM FISH COMMAND CENTER</h1>
<p id="updateDate"></p>
</div>

<div class="kpi-grid">

<div class="card">
<h3>Actual Ton</h3>
<div class="value" id="actualTon">-</div>
</div>

<div class="card">
<h3>Budget Ton</h3>
<div class="value" id="budgetTon">-</div>
</div>

<div class="card">
<h3>Forecast EOM</h3>
<div class="value" id="forecastTon">-</div>
</div>

<div class="card">
<h3>Gap</h3>
<div class="value" id="gapTon">-</div>
</div>

</div>

<h2>Fish4 Central</h2>

<div class="kpi-grid">
  <div class="card">
    <h3>Actual</h3>
    <div class="value" id="fish4Actual">-</div>
  </div>

  <div class="card">
    <h3>Forecast</h3>
    <div class="value" id="fish4Forecast">-</div>
  </div>
</div>

<h2>Fish5 South</h2>

<div class="kpi-grid">
  <div class="card">
    <h3>Actual</h3>
    <div class="value" id="fish5Actual">-</div>
  </div>

  <div class="card">
    <h3>Forecast</h3>
    <div class="value" id="fish5Forecast">-</div>
  </div>
</div>

 <h2>Speed Monitor</h2>

<div class="kpi-grid">
  <div class="card">
    <h3>Current Speed</h3>
    <div class="value" id="currentSpeed">-</div>
  </div>

  <div class="card">
    <h3>Required Speed</h3>
    <div class="value" id="requiredSpeed">-</div>
  </div>
</div>

<h2>Achievement (%)</h2>

<div class="kpi-grid">
  <div class="card">
    <h3>Total</h3>
    <div class="value" id="achTotal">-</div>
  </div>

  <div class="card">
    <h3>Fish4</h3>
    <div class="value" id="achFish4">-</div>
  </div>

  <div class="card">
    <h3>Fish5</h3>
    <div class="value" id="achFish5">-</div>
  </div>
</div>

<h2>Top Customers</h2>

<div class="card">
  <ol id="topCustomers"></ol>
</div> 
  
<h2>Executive Summary</h2>

<div class="card">
  <ul id="summary"></ul>
</div>

<script>
fetch('dashboard.json')
.then(response => response.json())
.then(data => {

document.getElementById('updateDate').innerText =
'Update : ' + data.date;

document.getElementById('actualTon').innerText =
data.total.actualTon.toFixed(1);

document.getElementById('budgetTon').innerText =
data.total.budgetTon.toFixed(1);

document.getElementById('forecastTon').innerText =
data.total.forecastTon.toFixed(1);

document.getElementById('gapTon').innerText =
data.total.gapTon.toFixed(1);

document.getElementById('fish4Actual').innerText =
data.fish4.actualTon.toFixed(1);

document.getElementById('fish4Forecast').innerText =
data.fish4.forecastTon.toFixed(1);

document.getElementById('fish5Actual').innerText =
data.fish5.actualTon.toFixed(1);

document.getElementById('fish5Forecast').innerText =
data.fish5.forecastTon.toFixed(1);

let html='';

data.summary.forEach(item=>{
html += '<li>' + item + '</li>';
});

document.getElementById('summary').innerHTML = html;

document.getElementById('currentSpeed').innerText =
data.speed.current + ' T/D';

document.getElementById('requiredSpeed').innerText =
data.speed.required + ' T/D';

document.getElementById('achTotal').innerText =
data.achievement.total + '%';

document.getElementById('achFish4').innerText =
data.achievement.fish4 + '%';

document.getElementById('achFish5').innerText =
data.achievement.fish5 + '%';

let custHtml='';

data.topCustomers.forEach(c=>{
  custHtml += '<li>' + c.name + ' - ' + c.ton + ' ตัน</li>';
});

document.getElementById('topCustomers').innerHTML =
custHtml;

});
  
</script>

</body>
</html>
